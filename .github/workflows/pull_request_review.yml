name: Run Tests on Pull Request

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Configura el entorno de Java con la versión 17 (la que usa tu proyecto)
    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Habilita la caché de Gradle para que las builds sean más rápidas

    # 3. Da permisos de ejecución al wrapper de Gradle (por si se subió desde Windows sin permisos)
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # 4. Construye el proyecto y ejecuta las pruebas
    - name: Build and run tests
      run: ./gradlew build
